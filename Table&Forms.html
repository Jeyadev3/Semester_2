<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <table border="3" align="center">
        <tr>
            <th colspan="2" style="color: red;background-color: bisque;">Registration Form</th>
        </tr>
        <tr style="background-color:aqua">
            <td>Enter Name</td>
            <td><input type="text" name="text"></td>
        </tr>
        <tr style="background-color: aqua;">
            <td>Enter Password</td>
            <td><input type="password" ></td>
        </tr>
        <tr style="background-color: aqua;">
            <td>Enter Address</td>
            <td><textarea></textarea></td>
        </tr>
        <tr style="background-color: aqua;">
            <td>Select Game</td>
            <td><input type="checkbox" value="Hockey">Hockey<br>
            <input type="checkbox" value="Football">Football</td>
        </tr>
        <tr style="background-color: aqua;">
            <td>Gender</td>
            <td><input type="radio" name="gender" value="male">male
            <input type="radio" name="gender" value="female">female</td>
        </tr>
        <tr style="background-color: aqua;">   
            <td>Select your age</td>
            <td><Select>
                <option value="18">18</option>
                <option value="19">19</option>
            </Select></td>
        </tr>
        <tr style="background-color: aqua;">
            <td>Select Photo</td>
            <td><input type="file" ></td>
        </tr>
        <tr style="background-color: aqua;">
            <td colspan="2" align="center">
                <input type="button" value="Click me">
                <input type="button" value="Reset">
                <input type="button" value="Submit">
                <input type="range" style="accent-color: red;">
            </td>
        </tr>
    </table>
</body>
</html>
