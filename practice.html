<!DOCTYPE html>
<html>

<head>

<title>Student Table</title>

<style>

body{
    font-family: Arial;
    background-color: lightyellow;
}

table{
    width: 60%;
    margin: auto;
    border-collapse: collapse;
    background-color: white;
}

th{
    background-color: green;
    color: white;
    padding: 10px;
}

td{
    text-align: center;
    padding: 10px;
}

table, th, td{
    border: 2px solid black;
}

tr:hover{
    background-color: lightgray;
}

h2{
    text-align: center;
    color: blue;
}

</style>

</head>

<body>

<h2>Student Details</h2>

<table>

<tr>
    <th>Name</th>
    <th>Roll No</th>
    <th>Department</th>
</tr>

<tr>
    <td>Ram</td>
    <td>101</td>
    <td>CSE</td>
</tr>

<tr>
    <td>Hari</td>
    <td>102</td>
    <td>ECE</td>
</tr>

<tr>
    <td>Sita</td>
    <td>103</td>
    <td>MECH</td>
</tr>

</table>

</body>
</html>
