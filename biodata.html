<!DOCTYPE html>
<html>
    <head>
        <title>Biodata</title>

    </head>
    <body style="background-image: url(background.jpg);">
        
        <h1 align = "center">BIODATA</h1>
        <hr>
        <form>
            <label>Name :</label>
            <input type = "text" name = "Name" placeholder = "Enter the name" /><br><br>
            <label>DOB :</label>
            <input type = "date" name = "DOB" /><br><br>
            <label>Father's Name :</label>
            <input type = "text" name = "Fname" placeholder = "Enter your Father's Name" /><br><br>
            <label>Age :</label>
            <input type = "number" name = "Age" min="0" /><br><br>
            <label>Gender :</label><br>
            <label><input type = "radio" name = "gender" value = "male" /> Male</label>
            <label><input type = "radio" name = "gender" value = "female" /> Female</label><br><br>
            <label>Email :</label>
            <input type = "email" name = "email" placeholder = "Enter your email" /><br><br>
            <label>Mobile Number :</label>
            <input type = "tel" name = "number" placeholder = "Enter the number" /><br><br>
            <label>Address :</label>
            <textarea name = "Address" rows = "3" cols = "30" placeholder = "Enter your address"></textarea> <br><br>
            <input type = "submit" name = "Submit" value = "Submit" />
            <input type = "reset" name = "Reset" value = "Reset" />
                
        </form>

    </body>
</html>
